<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stack — algo.viz</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/common/styles.css" />
  <style>
    .av-algo-btn.active { color:var(--accent4); background:rgba(247,201,106,0.1); border-color:rgba(247,201,106,0.3); }
    .av-algo-btn.active::before { background:var(--accent4); }
    .av-step-btn--play { background:var(--accent4); border-color:var(--accent4); color:#0a0a0f; }
    .av-step-btn--play:hover:not(:disabled) { filter:brightness(0.88) !important; }
    .canvas-wrap { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; min-height:280px; }
    canvas { width:100%; height:100%; display:block; }
    .av-input { background:var(--border); color:var(--text); border:1px solid var(--border); border-radius:8px; font-family:'Space Mono',monospace; font-size:0.82rem; padding:0.5rem 0.75rem; outline:none; width:100%; transition:border-color 0.15s; }
    .av-input:focus { border-color:var(--accent4); }
    .av-input::placeholder { color:var(--muted); }
    .av-btn--icon { flex:none; width:38px; height:36px; background:var(--border); color:var(--text); border:1px solid var(--border); border-radius:8px; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
    .av-btn--icon:hover { background:#252535; }
    .input-row { display:flex; gap:0.5rem; align-items:center; }
    .result-chip { font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--accent3); background:rgba(106,247,200,0.08); border:1px solid rgba(106,247,200,0.2); border-radius:6px; padding:0.3rem 0.7rem; min-height:28px; display:flex; align-items:center; }
  </style>
</head>
<body>
<nav class="av-nav">
  <a href="index.html" class="av-nav__logo">algo.viz</a>
  <span class="av-nav__sep">/</span>
  <span class="av-nav__page">Stack</span>
</nav>
<div class="av-layout">
  <aside class="av-sidebar">
    <div>
      <div class="av-section-label">연산</div>
      <div class="av-algo-list" id="algoList">
        <button class="av-algo-btn active" data-algo="push">push</button>
        <button class="av-algo-btn" data-algo="pop">pop</button>
        <button class="av-algo-btn" data-algo="peek">peek</button>
      </div>
    </div>

    <div class="av-info-panel" id="infoPanel">
      <div class="av-algo-desc" id="algoDesc"></div>
      <div class="av-meta-row" id="metaRow"></div>
    </div>

    <div class="av-controls">
      <div class="av-section-label">입력</div>
      <input class="av-input" type="number" id="valueInput" placeholder="숫자 입력 후 아래 버튼 클릭..." />
      <div class="av-btn-row">
        <button class="av-btn av-btn--primary" id="actionBtn">push 실행</button>
        <button class="av-btn av-btn--secondary" id="clearBtn">↺ 초기화</button>
      </div>
      <div class="result-chip" id="resultChip">—</div>
      <div class="av-slider-wrap">
        <label>재생 속도 <span id="speedVal">중간</span></label>
        <input type="range" id="speedSlider" min="1" max="5" value="3" />
      </div>
    </div>

    <div class="av-legend">
      <div class="av-section-label">범례</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#2a2845"></div>일반 요소</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#7c6af7"></div>새로 추가됨</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#f76a8c"></div>꺼내는 중 / 제거</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#6af7c8"></div>peek 확인 중</div>
    </div>
  </aside>

  <main class="av-main">
    <div class="av-stats-bar">
      <div class="av-stat"><div class="av-stat__label">연산</div><div class="av-stat__value" id="opName">push</div></div>
      <div class="av-stat"><div class="av-stat__label">크기</div><div class="av-stat__value av-stat__value--teal" id="sizeVal">0</div></div>
      <div class="av-stat"><div class="av-stat__label">상단 값</div><div class="av-stat__value av-stat__value--purple" id="topVal">—</div></div>
      <div class="av-status av-status--idle" id="statusBadge">IDLE</div>
    </div>
    <div class="canvas-wrap" id="canvasWrap"><canvas id="dsCanvas"></canvas></div>
    <div class="av-step-bar">
      <div class="av-step-bar__counter"><span id="stepCur">0</span> / <span id="stepTot">0</span></div>
      <button class="av-step-btn" id="firstBtn" disabled>⏮</button>
      <button class="av-step-btn" id="prevBtn"  disabled>◀</button>
      <button class="av-step-btn av-step-btn--play" id="playBtn" disabled>▶</button>
      <button class="av-step-btn" id="nextBtn"  disabled>▶|</button>
      <button class="av-step-btn" id="lastBtn"  disabled>⏭</button>
      <div class="av-step-bar__desc" id="stepDesc">연산을 선택하고 값을 입력하세요</div>
      <div class="av-step-bar__kbd">← → Space</div>
    </div>
    <div class="av-code-panel"><pre id="pseudoCode"></pre></div>
  </main>
</div>
<script type="module" src="src/ds/stack.js"></script>
</body>
</html>
