<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정렬 알고리즘 — algo.viz</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --text: #e2e0ff;
      --muted: #5a5880;
      --accent: #7c6af7;
      --accent2: #f76a8c;
      --accent3: #6af7c8;
      --bar-base: #2a2845;
      --bar-active: #7c6af7;
      --bar-compare: #f76a8c;
      --bar-sorted: #6af7c8;
      --bar-pivot: #f7c96a;
      --bar-aux-l: #6a9af7;
      --bar-aux-r: #f7a06a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.4;
    }

    /* NAV */
    nav {
      padding: 0.9rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    nav a {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.15s;
    }

    nav a:hover { color: var(--text); }

    nav a.home {
      font-size: 1rem;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    nav .sep { color: var(--border); }
    nav .current { color: var(--text); font-size: 0.7rem; font-family: 'Space Mono', monospace; }

    /* LAYOUT */
    .layout {
      display: grid;
      grid-template-columns: 270px 1fr;
      min-height: calc(100vh - 45px);
    }

    aside {
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      overflow-y: auto;
    }

    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .algo-list { display: flex; flex-direction: column; gap: 0.35rem; }

    .algo-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      text-align: left;
      padding: 0.55rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
    }

    .algo-btn:hover { color: var(--text); background: var(--border); }

    .algo-btn.active {
      color: var(--accent);
      background: rgba(124,106,247,0.1);
      border-color: rgba(124,106,247,0.3);
    }

    .algo-btn.active::before {
      content: '';
      position: absolute;
      left: -1.5rem; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 60%;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ALGO INFO PANEL */
    .info-panel {
      background: rgba(124,106,247,0.05);
      border: 1px solid rgba(124,106,247,0.15);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .algo-desc {
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.65;
      opacity: 0.85;
    }

    /* Complexity table */
    .complexity-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
    }

    .complexity-table th {
      color: var(--muted);
      font-weight: 400;
      text-align: left;
      padding: 0.3rem 0.4rem;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.05em;
    }

    .complexity-table td {
      padding: 0.3rem 0.4rem;
      color: var(--text);
    }

    .complexity-table tr:not(:last-child) td { border-bottom: 1px solid rgba(30,30,46,0.5); }

    .tc-best  { color: var(--accent3) !important; }
    .tc-avg   { color: var(--accent)  !important; }
    .tc-worst { color: var(--accent2) !important; }

    /* Meta badges */
    .meta-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .meta-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      padding: 0.25rem 0.6rem;
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .meta-stable   { background: rgba(106,247,200,0.1); color: var(--accent3); border: 1px solid rgba(106,247,200,0.2); }
    .meta-unstable { background: rgba(247,106,140,0.1); color: var(--accent2); border: 1px solid rgba(247,106,140,0.2); }
    .meta-mem      { background: rgba(124,106,247,0.1); color: var(--accent);  border: 1px solid rgba(124,106,247,0.2); }

    /* Controls */
    .controls-group { display: flex; flex-direction: column; gap: 0.9rem; }

    .slider-wrap { display: flex; flex-direction: column; gap: 0.35rem; }

    .slider-wrap label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .slider-wrap label span {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--text);
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 3px;
      background: var(--border);
      border-radius: 2px; outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .btn-row { display: flex; gap: 0.5rem; }

    .btn {
      flex: 1; border: none; border-radius: 8px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.82rem; padding: 0.55rem 0;
      cursor: pointer; transition: all 0.18s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #6a58e0; transform: translateY(-1px); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover:not(:disabled) { background: #252535; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

    /* Legend */
    .legend { display: flex; flex-direction: column; gap: 0.45rem; }
    .legend-item { display: flex; align-items: center; gap: 0.55rem; font-size: 0.75rem; color: var(--muted); }
    .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

    /* ── MAIN ─────────────────────────────── */
    main {
      display: flex; flex-direction: column;
      padding: 1.4rem 1.8rem;
      gap: 1.1rem;
    }

    .stats-bar {
      display: flex; align-items: center;
      gap: 1.8rem; flex-wrap: wrap;
    }

    .stat-chip { display: flex; flex-direction: column; gap: 0.12rem; }

    .stat-chip .lbl {
      font-family: 'Space Mono', monospace;
      font-size: 0.56rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted);
    }

    .stat-chip .val {
      font-family: 'Space Mono', monospace;
      font-size: 1rem; color: var(--text);
    }

    .val.c { color: var(--accent2); }
    .val.s { color: var(--accent3); }

    .status-badge {
      margin-left: auto;
      padding: 0.28rem 0.9rem;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.1em;
    }

    .status-badge.idle     { background: var(--border); color: var(--muted); }
    .status-badge.stepping { background: rgba(247,201,106,0.13); color: var(--bar-pivot); }
    .status-badge.playing  { background: rgba(124,106,247,0.18); color: var(--accent); }
    .status-badge.done     { background: rgba(106,247,200,0.13); color: var(--accent3); }

    /* Viz */
    .viz-wrap {
      flex: 1; display: flex; flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      min-height: 240px;
    }

    .viz-area {
      flex: 1; padding: 1rem 1rem 0.3rem;
      display: flex; align-items: flex-end;
      gap: 2px; min-height: 190px;
    }

    .aux-panel {
      display: none; flex-direction: column;
      border-top: 1px dashed var(--border);
      padding: 0.55rem 1rem 0.65rem;
      gap: 0.35rem;
      background: rgba(106,154,247,0.03);
    }

    .aux-panel.visible { display: flex; }

    .aux-head {
      display: flex; align-items: center; gap: 0.7rem;
    }

    .aux-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--bar-aux-l);
    }

    .aux-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.56rem; color: var(--muted);
    }

    .aux-bars {
      display: flex; align-items: flex-end;
      gap: 2px; height: 65px;
    }

    .bar {
      flex: 1; border-radius: 3px 3px 0 0;
      min-width: 2px;
      transition: height 0.04s ease, background 0.08s ease;
      background: var(--bar-base);
    }

    .bar.active      { background: var(--bar-active); }
    .bar.compare     { background: var(--bar-compare); }
    .bar.sorted      { background: var(--bar-sorted); }
    .bar.pivot       { background: var(--bar-pivot); }
    .bar.merge-range { background: #3a3060; }

    .aux-bar {
      flex: 1; border-radius: 3px 3px 0 0;
      min-width: 2px; background: transparent;
      transition: height 0.04s ease, background 0.08s ease;
    }

    .aux-bar.filled      { background: #3a4870; }
    .aux-bar.aux-left    { background: var(--bar-aux-l); }
    .aux-bar.aux-right   { background: var(--bar-aux-r); }
    .aux-bar.aux-placing { background: var(--accent3); }

    /* Step bar */
    .step-bar {
      display: flex; align-items: center; gap: 0.65rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.7rem 1.1rem;
    }

    .step-ctr {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem; color: var(--muted);
      min-width: 95px; white-space: nowrap;
    }

    .step-ctr span { color: var(--text); }

    .step-btn {
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      width: 32px; height: 32px; border-radius: 7px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: all 0.14s; flex-shrink: 0;
    }

    .step-btn:hover:not(:disabled) {
      background: var(--border);
      border-color: var(--accent); color: var(--accent);
    }

    .step-btn:disabled { opacity: 0.22; cursor: not-allowed; }

    .play-btn {
      background: var(--accent); border-color: var(--accent);
      color: #fff; width: 38px; font-size: 0.95rem;
    }

    .play-btn:hover:not(:disabled) { background: #6a58e0 !important; border-color: #6a58e0 !important; color: #fff !important; }

    .step-desc {
      flex: 1; font-size: 0.72rem; color: var(--muted);
      font-family: 'Space Mono', monospace;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }

    .kbd {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; color: var(--muted); opacity: 0.5;
      white-space: nowrap;
    }

    /* Code panel */
    .code-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.9rem 1.3rem;
      max-height: 120px; overflow-y: auto;
    }

    .code-panel pre {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem; line-height: 1.85;
      color: var(--muted); white-space: pre-wrap;
    }

    .code-panel pre .hl {
      color: var(--accent);
      background: rgba(124,106,247,0.12);
      display: inline-block; width: 100%;
      border-radius: 3px; padding: 0 0.3rem;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @media (max-width: 750px) {
      .layout { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="home">algo.viz</a>
  <span class="sep">/</span>
  <span class="current">정렬 알고리즘</span>
</nav>

<div class="layout">
  <aside>
    <!-- Algo list -->
    <div>
      <div class="section-label">알고리즘</div>
      <div class="algo-list" id="algoList">
        <button class="algo-btn active" data-algo="bubble">Bubble Sort</button>
        <button class="algo-btn" data-algo="selection">Selection Sort</button>
        <button class="algo-btn" data-algo="insertion">Insertion Sort</button>
        <button class="algo-btn" data-algo="merge">Merge Sort</button>
        <button class="algo-btn" data-algo="quick">Quick Sort</button>
        <button class="algo-btn" data-algo="heap">Heap Sort</button>
      </div>
    </div>

    <!-- Info panel -->
    <div class="info-panel" id="infoPanel">
      <div class="algo-desc" id="algoDesc"></div>
      <table class="complexity-table">
        <thead>
          <tr>
            <th>경우</th>
            <th>시간 복잡도</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>최선</td><td class="tc-best"  id="tcBest">—</td></tr>
          <tr><td>평균</td><td class="tc-avg"   id="tcAvg">—</td></tr>
          <tr><td>최악</td><td class="tc-worst" id="tcWorst">—</td></tr>
        </tbody>
      </table>
      <div class="meta-row" id="metaRow"></div>
    </div>

    <!-- Controls -->
    <div class="controls-group">
      <div class="section-label">설정</div>
      <div class="slider-wrap">
        <label>배열 크기 <span id="sizeVal">30</span></label>
        <input type="range" id="sizeSlider" min="8" max="70" value="30" />
      </div>
      <div class="slider-wrap">
        <label>재생 속도 <span id="speedVal">중간</span></label>
        <input type="range" id="speedSlider" min="1" max="5" value="3" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary"   id="generateBtn">새 배열</button>
        <button class="btn btn-secondary" id="resetBtn">↺ 처음</button>
      </div>
    </div>

    <!-- Legend -->
    <div class="legend">
      <div class="section-label">범례</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--bar-base)"></div>기본</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--bar-active)"></div>Active</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--bar-compare)"></div>Compare</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--bar-pivot)"></div>Pivot</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--bar-sorted)"></div>정렬 완료</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--bar-aux-l)"></div>Aux Left</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--bar-aux-r)"></div>Aux Right</div>
    </div>
  </aside>

  <main>
    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-chip">
        <div class="lbl">알고리즘</div>
        <div class="val" id="algoName">Bubble Sort</div>
      </div>
      <div class="stat-chip">
        <div class="lbl">비교</div>
        <div class="val c" id="compCount">0</div>
      </div>
      <div class="stat-chip">
        <div class="lbl">교환</div>
        <div class="val s" id="swapCount">0</div>
      </div>
      <div class="status-badge idle" id="statusBadge">IDLE</div>
    </div>

    <!-- Viz -->
    <div class="viz-wrap">
      <div class="viz-area"  id="vizArea"></div>
      <div class="aux-panel" id="auxPanel">
        <div class="aux-head">
          <div class="aux-title">Auxiliary Space</div>
          <div class="aux-sub">left[] · right[] 임시 배열</div>
        </div>
        <div class="aux-bars" id="auxBars"></div>
      </div>
    </div>

    <!-- Step controls -->
    <div class="step-bar">
      <div class="step-ctr"><span id="stepCur">0</span> / <span id="stepTot">0</span></div>
      <button class="step-btn" id="firstBtn" disabled>⏮</button>
      <button class="step-btn" id="prevBtn"  disabled>◀</button>
      <button class="step-btn play-btn" id="playBtn" disabled>▶</button>
      <button class="step-btn" id="nextBtn"  disabled>▶|</button>
      <button class="step-btn" id="lastBtn"  disabled>⏭</button>
      <div class="step-desc" id="stepDesc">알고리즘을 선택하고 배열을 생성하세요</div>
      <div class="kbd">← → Space</div>
    </div>

    <!-- Code -->
    <div class="code-panel">
      <pre id="pseudoCode"></pre>
    </div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════
//  ALGO METADATA
// ═══════════════════════════════════════════════
const ALGO_META = {
  bubble: {
    name: 'Bubble Sort',
    desc: '인접한 두 원소를 반복적으로 비교하여 큰 값을 오른쪽으로 밀어냅니다. 구현이 가장 단순하지만 실용적으로는 거의 사용되지 않습니다. 이미 정렬된 배열에서는 O(n)으로 동작합니다.',
    best: 'O(n)', avg: 'O(n²)', worst: 'O(n²)', space: 'O(1)',
    stable: true, hasAux: false,
  },
  selection: {
    name: 'Selection Sort',
    desc: '매 패스마다 미정렬 구간에서 최솟값을 찾아 앞으로 가져옵니다. 교환 횟수가 O(n)으로 적지만 비교 횟수는 항상 O(n²)입니다. 불안정 정렬입니다.',
    best: 'O(n²)', avg: 'O(n²)', worst: 'O(n²)', space: 'O(1)',
    stable: false, hasAux: false,
  },
  insertion: {
    name: 'Insertion Sort',
    desc: '정렬된 구간을 유지하며 새 원소를 적절한 위치에 삽입합니다. 거의 정렬된 데이터에서 매우 빠르며, 소규모 데이터나 다른 알고리즘의 보조로 자주 쓰입니다.',
    best: 'O(n)', avg: 'O(n²)', worst: 'O(n²)', space: 'O(1)',
    stable: true, hasAux: false,
  },
  merge: {
    name: 'Merge Sort',
    desc: '분할 정복(Divide & Conquer) 방식으로 배열을 반으로 나눈 뒤 병합합니다. 항상 O(n log n)을 보장하며 안정 정렬입니다. 단, 병합 시 O(n) 추가 메모리가 필요합니다.',
    best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n log n)', space: 'O(n)',
    stable: true, hasAux: true,
  },
  quick: {
    name: 'Quick Sort',
    desc: '피벗을 선택해 작은 값과 큰 값으로 분할하는 분할 정복 알고리즘입니다. 평균적으로 가장 빠른 정렬 중 하나이지만, 피벗 선택이 나쁘면 O(n²)이 될 수 있습니다.',
    best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n²)', space: 'O(log n)',
    stable: false, hasAux: false,
  },
  heap: {
    name: 'Heap Sort',
    desc: '최대 힙(Max Heap) 자료구조를 이용해 정렬합니다. 항상 O(n log n)을 보장하고 추가 메모리가 필요 없지만, 캐시 지역성이 낮아 Quick Sort보다 실제 성능은 느릴 수 있습니다.',
    best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n log n)', space: 'O(1)',
    stable: false, hasAux: false,
  },
};

const PSEUDO = {
  bubble: [
    'for i = 0 to n-1:',
    '  for j = 0 to n-i-2:',
    '    if arr[j] > arr[j+1]:',
    '      swap(arr[j], arr[j+1])',
  ],
  selection: [
    'for i = 0 to n-1:',
    '  minIdx = i',
    '  for j = i+1 to n:',
    '    if arr[j] < arr[minIdx]:',
    '      minIdx = j',
    '  swap(arr[i], arr[minIdx])',
  ],
  insertion: [
    'for i = 1 to n:',
    '  key = arr[i]; j = i-1',
    '  while j >= 0 and arr[j] > key:',
    '    arr[j+1] = arr[j]; j--',
    '  arr[j+1] = key',
  ],
  merge: [
    'mergeSort(arr, l, r):',
    '  if l >= r: return',
    '  mid = (l + r) / 2',
    '  mergeSort(arr, l, mid)',
    '  mergeSort(arr, mid+1, r)',
    '  left[]  = arr[l..mid]',
    '  right[] = arr[mid+1..r]',
    '  i=0; j=0; k=l',
    '  while i<|L| and j<|R|:',
    '    place min(L[i], R[j]) → arr[k]',
  ],
  quick: [
    'quickSort(arr, low, high):',
    '  if low >= high: return',
    '  pivot = arr[high]',
    '  i = low - 1',
    '  for j = low to high-1:',
    '    if arr[j] <= pivot:',
    '      i++; swap(arr[i], arr[j])',
    '  swap(arr[i+1], arr[high])  // pivot 확정',
    '  quickSort(arr, low, pi-1)',
    '  quickSort(arr, pi+1, high)',
  ],
  heap: [
    'buildMaxHeap(arr)',
    'for i = n-1 downto 1:',
    '  swap(arr[0], arr[i])',
    '  heapify(arr, i, 0)',
    'heapify(arr, n, i):',
    '  l=2i+1; r=2i+2; largest=i',
    '  if arr[l]>arr[largest]: largest=l',
    '  if arr[r]>arr[largest]: largest=r',
    '  if largest != i:',
    '    swap; heapify(arr, n, largest)',
  ],
};

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let baseArray   = [];
let snapshots   = [];
let stepIdx     = 0;
let playTimer   = null;
let isPlaying   = false;
let currentAlgo = 'bubble';
const speedDelays = [700, 280, 110, 35, 6];
let playDelay = 110;

// ═══════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════
const vizArea    = document.getElementById('vizArea');
const auxPanel   = document.getElementById('auxPanel');
const auxBarsEl  = document.getElementById('auxBars');
const algoNameEl = document.getElementById('algoName');
const compCount  = document.getElementById('compCount');
const swapCount  = document.getElementById('swapCount');
const statusBadge= document.getElementById('statusBadge');
const pseudoCode = document.getElementById('pseudoCode');
const stepCur    = document.getElementById('stepCur');
const stepTot    = document.getElementById('stepTot');
const stepDesc   = document.getElementById('stepDesc');
const firstBtn   = document.getElementById('firstBtn');
const prevBtn    = document.getElementById('prevBtn');
const playBtn    = document.getElementById('playBtn');
const nextBtn    = document.getElementById('nextBtn');
const lastBtn    = document.getElementById('lastBtn');

// ═══════════════════════════════════════════════
//  INFO PANEL
// ═══════════════════════════════════════════════
function updateInfoPanel(algo) {
  const m = ALGO_META[algo];
  document.getElementById('algoDesc').textContent   = m.desc;
  document.getElementById('tcBest').textContent     = m.best;
  document.getElementById('tcAvg').textContent      = m.avg;
  document.getElementById('tcWorst').textContent    = m.worst;
  const metaRow = document.getElementById('metaRow');
  metaRow.innerHTML = `
    <span class="meta-badge ${m.stable ? 'meta-stable' : 'meta-unstable'}">
      ${m.stable ? '✓ 안정 정렬' : '✗ 불안정 정렬'}
    </span>
    <span class="meta-badge meta-mem">메모리 ${m.space}</span>
  `;
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function buildBarEls() {
  vizArea.innerHTML = ''; auxBarsEl.innerHTML = '';
  baseArray.forEach(() => {
    const b = document.createElement('div'); b.className = 'bar'; vizArea.appendChild(b);
    const ab = document.createElement('div'); ab.className = 'aux-bar'; auxBarsEl.appendChild(ab);
  });
}

function applySnapshot(idx) {
  if (!snapshots.length) return;
  const s = snapshots[idx];
  const bars    = vizArea.querySelectorAll('.bar');
  const auxBars = auxBarsEl.querySelectorAll('.aux-bar');
  const maxV = Math.max(...s.array);
  const auxMax = s.auxArray ? Math.max(...s.auxArray.filter(v=>v>0), 1) : 1;

  bars.forEach((b, i) => {
    b.style.height = (s.array[i] / maxV * 95) + '%';
    b.className = 'bar' + (s.colors[i] ? ' '+s.colors[i] : '');
  });

  if (s.auxArray) {
    auxBars.forEach((b, i) => {
      const v = s.auxArray[i];
      b.style.height = v > 0 ? (v / auxMax * 88) + '%' : '0%';
      b.className = 'aux-bar' + (s.auxColors?.[i] ? ' '+s.auxColors[i] : (v>0?' filled':''));
    });
  } else {
    auxBars.forEach(b => { b.style.height='0%'; b.className='aux-bar'; });
  }

  compCount.textContent = s.comparisons.toLocaleString();
  swapCount.textContent = s.swaps.toLocaleString();
  stepCur.textContent   = idx + 1;
  stepDesc.textContent  = s.desc;
  updatePseudo(s.hlLine);
  updateStepBtns();
}

function updatePseudo(hlLine) {
  const lines = PSEUDO[currentAlgo];
  pseudoCode.innerHTML = lines.map((l,i) =>
    i===hlLine ? `<span class="hl">${l}</span>` : l
  ).join('\n');
}

function updateStepBtns() {
  const atStart = stepIdx===0, atEnd = stepIdx===snapshots.length-1;
  firstBtn.disabled = atStart; prevBtn.disabled = atStart;
  nextBtn.disabled  = atEnd;   lastBtn.disabled = atEnd;
  playBtn.disabled  = !snapshots.length;
  playBtn.textContent = isPlaying ? '⏸' : '▶';
}

function setStatus(s) {
  statusBadge.className = 'status-badge '+s;
  const L = {idle:'IDLE',stepping:'STEP',playing:'PLAY',done:'DONE ✓'};
  statusBadge.textContent = L[s]||s;
}

// ═══════════════════════════════════════════════
//  SNAPSHOT HELPERS
// ═══════════════════════════════════════════════
function snap(arr, colors, comp, swp, hl, desc, auxArr, auxC) {
  return {
    array: arr.slice(), colors: colors.slice(),
    comparisons: comp, swaps: swp,
    hlLine: hl??-1, desc: desc||'',
    auxArray: auxArr?auxArr.slice():null,
    auxColors: auxC?auxC.slice():null,
  };
}

// ═══════════════════════════════════════════════
//  RECORDERS
// ═══════════════════════════════════════════════
function recordBubble(arr) {
  const S=[],a=arr.slice(),n=a.length,c=Array(n).fill('');
  let cp=0,sw=0;
  S.push(snap(a,c,cp,sw,-1,'시작'));
  for(let i=0;i<n-1;i++){
    for(let j=0;j<n-i-1;j++){
      const nc=c.slice();nc[j]='active';nc[j+1]='compare';cp++;
      S.push(snap(a,nc,cp,sw,2,`[${j}]=${a[j]} vs [${j+1}]=${a[j+1]}`));
      if(a[j]>a[j+1]){[a[j],a[j+1]]=[a[j+1],a[j]];sw++;
        const sc=c.slice();sc[j]='active';sc[j+1]='active';
        S.push(snap(a,sc,cp,sw,3,`swap → [${j}]=${a[j]}, [${j+1}]=${a[j+1]}`))}
    }
    c[n-1-i]='sorted';
    S.push(snap(a,c,cp,sw,0,`패스 ${i+1} 완료`));
  }
  c[0]='sorted';S.push(snap(a,c,cp,sw,-1,'정렬 완료 ✓'));
  return S;
}

function recordSelection(arr) {
  const S=[],a=arr.slice(),n=a.length,c=Array(n).fill('');
  let cp=0,sw=0;
  S.push(snap(a,c,cp,sw,-1,'시작'));
  for(let i=0;i<n-1;i++){
    let mi=i;c[i]='active';
    S.push(snap(a,c,cp,sw,1,`i=${i}, min=${a[i]}`));
    for(let j=i+1;j<n;j++){
      const p=c.slice();p[j]='compare';cp++;
      S.push(snap(a,p,cp,sw,3,`[${j}]=${a[j]} vs min=${a[mi]}`));
      if(a[j]<a[mi]){if(mi!==i)c[mi]='';mi=j;c[mi]='pivot';
        S.push(snap(a,c,cp,sw,4,`새 최솟값 [${j}]=${a[j]}`))}
      else c[j]='';
    }
    if(mi!==i){[a[i],a[mi]]=[a[mi],a[i]];sw++;}
    c[i]='sorted';if(mi!==i)c[mi]='';
    S.push(snap(a,c,cp,sw,5,`[${i}]=${a[i]} 확정`));
  }
  c[n-1]='sorted';S.push(snap(a,c,cp,sw,-1,'정렬 완료 ✓'));
  return S;
}

function recordInsertion(arr) {
  const S=[],a=arr.slice(),n=a.length,c=Array(n).fill('');
  let cp=0,sw=0;
  c[0]='sorted';S.push(snap(a,c,cp,sw,-1,'시작'));
  for(let i=1;i<n;i++){
    const key=a[i];let j=i-1;c[i]='active';
    S.push(snap(a,c,cp,sw,0,`key = [${i}] = ${key}`));
    while(j>=0&&a[j]>key){
      c[j]='compare';cp++;
      S.push(snap(a,c,cp,sw,2,`[${j}]=${a[j]} > key=${key}`));
      a[j+1]=a[j];sw++;c[j+1]='sorted';c[j]='';
      S.push(snap(a,c,cp,sw,3,`[${j+1}] ← [${j}]`));
      j--;
    }
    a[j+1]=key;c[j+1]='sorted';c[i]='sorted';
    S.push(snap(a,c,cp,sw,4,`[${j+1}] ← key=${key}`));
  }
  S.push(snap(a,c,cp,sw,-1,'정렬 완료 ✓'));
  return S;
}

function recordMerge(arr) {
  const S=[],a=arr.slice(),n=a.length,c=Array(n).fill('');
  const aux=Array(n).fill(0),auxC=Array(n).fill('');
  let cp=0,sw=0;

  function s(hl,desc){ S.push(snap(a,c,cp,sw,hl,desc,aux,auxC)); }

  s(-1,'시작');

  function ms(l,r){
    if(l>=r){c[l]='sorted';s(1,`기저: [${l}]=${a[l]}`);return;}
    const mid=Math.floor((l+r)/2);
    for(let k=l;k<=r;k++)c[k]='merge-range';
    s(2,`분할 [${l}..${mid}] | [${mid+1}..${r}]`);
    ms(l,mid);ms(mid+1,r);

    for(let k=0;k<n;k++){aux[k]=0;auxC[k]='';}
    for(let k=l;k<=mid;k++){aux[k]=a[k];auxC[k]='aux-left';}
    s(5,`Left 복사 → aux[${l}..${mid}]`);
    for(let k=mid+1;k<=r;k++){aux[k]=a[k];auxC[k]='aux-right';}
    s(6,`Right 복사 → aux[${mid+1}..${r}]`);

    let i=l,j=mid+1,k=l;
    while(i<=mid&&j<=r){
      const t=auxC.slice();t[i]='aux-left';t[j]='aux-right';cp++;
      S.push(snap(a,c,cp,sw,8,`비교 aux[${i}]=${aux[i]} vs aux[${j}]=${aux[j]}`,aux,t));
      if(aux[i]<=aux[j]){
        a[k]=aux[i];const p=auxC.slice();p[i]='aux-placing';c[k]='active';
        S.push(snap(a,c,cp,sw,9,`arr[${k}] ← ${aux[i]} (L)`,aux,p));i++;
      }else{
        a[k]=aux[j];sw++;const p=auxC.slice();p[j]='aux-placing';c[k]='active';
        S.push(snap(a,c,cp,sw,9,`arr[${k}] ← ${aux[j]} (R)`,aux,p));j++;
      }
      k++;
    }
    while(i<=mid){a[k]=aux[i];c[k]='active';i++;k++;}
    while(j<=r){a[k]=aux[j];c[k]='active';j++;k++;}
    for(let x=l;x<=r;x++)c[x]='sorted';
    const ca=aux.slice(),cc=auxC.slice();
    for(let x=l;x<=r;x++){ca[x]=0;cc[x]='';}
    S.push(snap(a,c,cp,sw,-1,`병합 완료 [${l}..${r}]`,ca,cc));
    for(let x=l;x<=r;x++){aux[x]=0;auxC[x]='';}
  }

  ms(0,n-1);
  S.push(snap(a,c,cp,sw,-1,'정렬 완료 ✓',Array(n).fill(0),Array(n).fill('')));
  return S;
}

function recordQuick(arr) {
  const S=[],a=arr.slice(),n=a.length,c=Array(n).fill('');
  let cp=0,sw=0;
  function s(hl,desc){S.push(snap(a,c,cp,sw,hl,desc));}
  s(-1,'시작');
  function part(lo,hi){
    const piv=a[hi];c[hi]='pivot';s(2,`pivot=${piv}`);
    let i=lo-1;
    for(let j=lo;j<hi;j++){
      c[j]='compare';cp++;s(5,`[${j}]=${a[j]} vs pivot=${piv}`);
      if(a[j]<=piv){i++;[a[i],a[j]]=[a[j],a[i]];sw++;c[i]='active';s(6,`swap [${i}]↔[${j}]`);c[i]='';}
      c[j]='';
    }
    [a[i+1],a[hi]]=[a[hi],a[i+1]];sw++;c[hi]='';c[i+1]='sorted';
    s(7,`pivot ${piv} → 위치 ${i+1}`);
    return i+1;
  }
  function qs(lo,hi){
    if(lo>hi)return;
    if(lo===hi){c[lo]='sorted';s(1,`단일 [${lo}]=${a[lo]}`);return;}
    s(0,`quickSort([${lo}..${hi}])`);
    const pi=part(lo,hi);qs(lo,pi-1);qs(pi+1,hi);
  }
  qs(0,n-1);s(-1,'정렬 완료 ✓');
  return S;
}

function recordHeap(arr) {
  const S=[],a=arr.slice(),n=a.length,c=Array(n).fill('');
  let cp=0,sw=0;
  function s(hl,desc){S.push(snap(a,c,cp,sw,hl,desc));}
  s(-1,'시작');
  function heapify(size,i){
    let lg=i,l=2*i+1,r=2*i+2;c[i]='active';
    if(l<size){cp++;if(a[l]>a[lg])lg=l;}
    if(r<size){cp++;if(a[r]>a[lg])lg=r;}
    s(5,`heapify(${i}): largest=${lg}`);
    if(lg!==i){[a[i],a[lg]]=[a[lg],a[i]];sw++;c[i]='';c[lg]='compare';
      s(9,`swap [${i}]↔[${lg}]`);c[lg]='';heapify(size,lg);}
    else c[i]='';
  }
  s(0,'Max Heap 구성');
  for(let i=Math.floor(n/2)-1;i>=0;i--)heapify(n,i);
  s(0,'Max Heap 완료');
  for(let i=n-1;i>0;i--){
    [a[0],a[i]]=[a[i],a[0]];sw++;c[i]='sorted';
    s(2,`[0]↔[${i}], 위치 ${i} 확정`);heapify(i,0);
  }
  c[0]='sorted';s(-1,'정렬 완료 ✓');
  return S;
}

// ═══════════════════════════════════════════════
//  PLAYBACK
// ═══════════════════════════════════════════════
function goTo(idx){
  stepIdx=Math.max(0,Math.min(snapshots.length-1,idx));
  applySnapshot(stepIdx);
  if(!isPlaying)setStatus(stepIdx===snapshots.length-1?'done':'stepping');
}

function stopPlay(){
  isPlaying=false;clearInterval(playTimer);playTimer=null;updateStepBtns();
}

function startPlay(){
  if(stepIdx>=snapshots.length-1)goTo(0);
  isPlaying=true;setStatus('playing');updateStepBtns();
  playTimer=setInterval(()=>{
    if(stepIdx>=snapshots.length-1){stopPlay();setStatus('done');return;}
    goTo(stepIdx+1);
  },playDelay);
}

function togglePlay(){
  if(!snapshots.length)return;
  isPlaying?(stopPlay(),setStatus(stepIdx===snapshots.length-1?'done':'stepping')):startPlay();
}

function buildSnapshots(){
  stopPlay();
  const rec={bubble:recordBubble,selection:recordSelection,insertion:recordInsertion,
             merge:recordMerge,quick:recordQuick,heap:recordHeap};
  snapshots=rec[currentAlgo](baseArray);
  stepIdx=0;
  stepTot.textContent=snapshots.length;
  auxPanel.classList.toggle('visible',ALGO_META[currentAlgo].hasAux);
  applySnapshot(0);
  setStatus('stepping');
}

function generateArray(){
  stopPlay();
  const n=parseInt(document.getElementById('sizeSlider').value);
  baseArray=Array.from({length:n},()=>Math.floor(Math.random()*85)+15);
  buildBarEls();buildSnapshots();
}

// ═══════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════
document.getElementById('generateBtn').addEventListener('click',generateArray);
document.getElementById('resetBtn').addEventListener('click',()=>{stopPlay();goTo(0);setStatus('stepping');});

firstBtn.addEventListener('click',()=>{stopPlay();goTo(0);setStatus('stepping');});
prevBtn.addEventListener('click', ()=>{stopPlay();goTo(stepIdx-1);setStatus('stepping');});
nextBtn.addEventListener('click', ()=>{stopPlay();goTo(stepIdx+1);setStatus(stepIdx===snapshots.length-1?'done':'stepping');});
lastBtn.addEventListener('click', ()=>{stopPlay();goTo(snapshots.length-1);setStatus('done');});
playBtn.addEventListener('click', togglePlay);

const sizeSlider=document.getElementById('sizeSlider');
const sizeVal=document.getElementById('sizeVal');
sizeSlider.addEventListener('input', ()=>sizeVal.textContent=sizeSlider.value);
sizeSlider.addEventListener('change',generateArray);

const speedSlider=document.getElementById('speedSlider');
const speedVal=document.getElementById('speedVal');
const speedLabels=['매우 느림','느림','중간','빠름','매우 빠름'];
speedSlider.addEventListener('input',()=>{
  const v=parseInt(speedSlider.value)-1;
  speedVal.textContent=speedLabels[v];
  playDelay=speedDelays[v];
  if(isPlaying){stopPlay();startPlay();}
});

document.getElementById('algoList').addEventListener('click',e=>{
  const btn=e.target.closest('.algo-btn');if(!btn)return;
  document.querySelectorAll('.algo-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentAlgo=btn.dataset.algo;
  algoNameEl.textContent=ALGO_META[currentAlgo].name;
  updateInfoPanel(currentAlgo);
  if(baseArray.length)buildSnapshots();
});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'){stopPlay();goTo(stepIdx+1);setStatus('stepping');}
  if(e.key==='ArrowLeft') {stopPlay();goTo(stepIdx-1);setStatus('stepping');}
  if(e.key===' ')         {e.preventDefault();togglePlay();}
  if(e.key==='Home')      {stopPlay();goTo(0);setStatus('stepping');}
  if(e.key==='End')       {stopPlay();goTo(snapshots.length-1);setStatus('done');}
});

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
updateInfoPanel('bubble');
generateArray();
</script>
