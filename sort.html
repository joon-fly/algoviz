<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정렬 알고리즘 — algo.viz</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/common/styles.css" />
  <style>
    /* Sort-specific */
    .viz-wrap {
      flex: 1; display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; min-height: 240px;
    }
    .viz-area {
      flex: 1; padding: 1rem 1rem 0.3rem;
      display: flex; align-items: flex-end; gap: 2px; min-height: 190px;
    }
    .bar {
      flex: 1; border-radius: 3px 3px 0 0; min-width: 2px;
      transition: height 0.04s ease, background 0.08s ease;
      background: #2a2845;
    }
    .bar.active      { background: #7c6af7; }
    .bar.compare     { background: #f76a8c; }
    .bar.sorted      { background: #6af7c8; }
    .bar.pivot       { background: #f7c96a; }
    .bar.merge-range { background: #3a3060; }

    .aux-panel {
      display: none; flex-direction: column;
      border-top: 1px dashed var(--border);
      padding: 0.55rem 1rem 0.65rem; gap: 0.35rem;
      background: rgba(106,154,247,0.03);
    }
    .aux-panel.visible { display: flex; }
    .aux-head { display: flex; align-items: center; gap: 0.7rem; }
    .aux-title {
      font-family: 'Space Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.12em; text-transform: uppercase; color: #6a9af7;
    }
    .aux-sub { font-family: 'Space Mono', monospace; font-size: 0.56rem; color: var(--muted); }
    .aux-bars { display: flex; align-items: flex-end; gap: 2px; height: 65px; }
    .aux-bar {
      flex: 1; border-radius: 3px 3px 0 0; min-width: 2px;
      background: transparent;
      transition: height 0.04s ease, background 0.08s ease;
    }
    .aux-bar.filled       { background: #3a4870; }
    .aux-bar.aux-left     { background: #6a9af7; }
    .aux-bar.aux-right    { background: #f7a06a; }
    .aux-bar.aux-placing  { background: #6af7c8; }
  </style>
</head>
<body>
<nav class="av-nav">
  <a href="index.html" class="av-nav__logo">algo.viz</a>
  <span class="av-nav__sep">/</span>
  <span class="av-nav__page">정렬 알고리즘</span>
</nav>

<div class="av-layout">
  <aside class="av-sidebar">
    <div>
      <div class="av-section-label">알고리즘</div>
      <div class="av-algo-list" id="algoList">
        <button class="av-algo-btn active" data-algo="bubble">Bubble Sort</button>
        <button class="av-algo-btn" data-algo="selection">Selection Sort</button>
        <button class="av-algo-btn" data-algo="insertion">Insertion Sort</button>
        <button class="av-algo-btn" data-algo="merge">Merge Sort</button>
        <button class="av-algo-btn" data-algo="quick">Quick Sort</button>
        <button class="av-algo-btn" data-algo="heap">Heap Sort</button>
      </div>
    </div>

    <div class="av-info-panel" id="infoPanel">
      <div class="av-algo-desc" id="algoDesc"></div>
      <table class="av-complexity-table">
        <thead><tr><th>경우</th><th>시간 복잡도</th></tr></thead>
        <tbody>
          <tr><td>최선</td><td class="tc-best"  id="tcBest">—</td></tr>
          <tr><td>평균</td><td class="tc-avg"   id="tcAvg">—</td></tr>
          <tr><td>최악</td><td class="tc-worst" id="tcWorst">—</td></tr>
        </tbody>
      </table>
      <div class="av-meta-row" id="metaRow"></div>
    </div>

    <div class="av-controls">
      <div class="av-section-label">설정</div>
      <div class="av-slider-wrap">
        <label>배열 크기 <span id="sizeVal">30</span></label>
        <input type="range" id="sizeSlider" min="8" max="70" value="30" />
      </div>
      <div class="av-slider-wrap">
        <label>재생 속도 <span id="speedVal">중간</span></label>
        <input type="range" id="speedSlider" min="1" max="5" value="3" />
      </div>
      <div class="av-btn-row">
        <button class="av-btn av-btn--primary"   id="generateBtn">새 배열</button>
        <button class="av-btn av-btn--secondary" id="resetBtn">↺ 처음</button>
      </div>
    </div>

    <div class="av-legend">
      <div class="av-section-label">범례</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#2a2845"></div>기본</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#7c6af7"></div>Active</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#f76a8c"></div>Compare</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#f7c96a"></div>Pivot</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#6af7c8"></div>정렬 완료</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#6a9af7"></div>임시배열 — 왼쪽 절반</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#f7a06a"></div>임시배열 — 오른쪽 절반</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#6af7c8"></div>임시배열 → 원본으로 복사 중</div>
    </div>
  </aside>

  <main class="av-main">
    <div class="av-stats-bar">
      <div class="av-stat">
        <div class="av-stat__label">알고리즘</div>
        <div class="av-stat__value" id="algoName">Bubble Sort</div>
      </div>
      <div class="av-stat">
        <div class="av-stat__label">비교</div>
        <div class="av-stat__value av-stat__value--pink" id="compCount">0</div>
      </div>
      <div class="av-stat">
        <div class="av-stat__label">교환</div>
        <div class="av-stat__value av-stat__value--teal" id="swapCount">0</div>
      </div>
      <div class="av-status av-status--idle" id="statusBadge">IDLE</div>
    </div>

    <div class="viz-wrap">
      <div class="viz-area"  id="vizArea"></div>
      <div class="aux-panel" id="auxPanel">
        <div class="aux-head">
          <div class="aux-title">Auxiliary Space (임시 배열)</div>
          <div class="aux-sub">왼쪽 · 오른쪽 절반 복사 후 병합</div>
        </div>
        <div class="aux-bars" id="auxBars"></div>
      </div>
    </div>

    <div class="av-step-bar">
      <div class="av-step-bar__counter"><span id="stepCur">0</span> / <span id="stepTot">0</span></div>
      <button class="av-step-btn" id="firstBtn" disabled>⏮</button>
      <button class="av-step-btn" id="prevBtn"  disabled>◀</button>
      <button class="av-step-btn av-step-btn--play" id="playBtn" disabled>▶</button>
      <button class="av-step-btn" id="nextBtn"  disabled>▶|</button>
      <button class="av-step-btn" id="lastBtn"  disabled>⏭</button>
      <div class="av-step-bar__desc" id="stepDesc">알고리즘을 선택하고 배열을 생성하세요</div>
      <div class="av-step-bar__kbd">← → Space</div>
    </div>

    <div class="av-code-panel"><pre id="pseudoCode"></pre></div>
  </main>
</div>

<script type="module" src="src/sort/main.js"></script>
</body>
</html>
