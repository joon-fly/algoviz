<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dijkstra / A* — algo.viz</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/common/styles.css" />
  <style>
    .av-algo-btn.active {
      color: var(--accent4);
      background: rgba(247,201,106,0.1);
      border-color: rgba(247,201,106,0.3);
    }
    .av-algo-btn.active::before { background: var(--accent4); }
    .av-step-btn--play { background: var(--accent4); border-color: var(--accent4); color: #0a0a0f; }
    .av-step-btn--play:hover:not(:disabled) { filter: brightness(0.88) !important; }
    .canvas-wrap {
      flex: 1; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; position: relative; min-height: 320px;
    }
    canvas { width:100%; height:100%; display:block; }
    .goal-row {
      display: flex; align-items: center; gap: 0.6rem;
      font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--muted);
    }
    .goal-row select {
      background: var(--border); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      font-family: 'Space Mono', monospace; font-size: 0.72rem;
      padding: 0.25rem 0.5rem; cursor: pointer; outline: none;
    }
    .goal-row.hidden { display: none; }
    .ds-panel {
      background: rgba(0,0,0,0.2); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.7rem 0.9rem;
      display: flex; flex-direction: column; gap: 0.45rem;
    }
    .ds-label { font-family:'Space Mono',monospace; font-size:0.58rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); }
    .ds-items { display:flex; flex-wrap:wrap; gap:0.35rem; min-height:28px; }
    .ds-item {
      font-family:'Space Mono',monospace; font-size:0.68rem;
      background:var(--border); color:var(--text);
      padding:0.2rem 0.5rem; border-radius:4px;
      border:1px solid rgba(255,255,255,0.06);
    }
    .ds-item.head { background:rgba(247,201,106,0.2); color:var(--accent4); border-color:rgba(247,201,106,0.3); }
  </style>
</head>
<body>
<nav class="av-nav">
  <a href="index.html" class="av-nav__logo">algo.viz</a>
  <span class="av-nav__sep">/</span>
  <span class="av-nav__page">Dijkstra / A*</span>
</nav>

<div class="av-layout">
  <aside class="av-sidebar">
    <div>
      <div class="av-section-label">알고리즘</div>
      <div class="av-algo-list" id="algoList">
        <button class="av-algo-btn active" data-algo="dijkstra">Dijkstra</button>
        <button class="av-algo-btn" data-algo="astar">A*</button>
      </div>
    </div>

    <div class="av-info-panel av-info-panel--graph" id="infoPanel">
      <div class="av-algo-desc" id="algoDesc"></div>
      <div class="av-meta-row" id="metaRow"></div>
    </div>

    <div class="ds-panel">
      <div class="ds-label" id="dsLabel">Priority Queue</div>
      <div class="ds-items" id="dsItems"></div>
    </div>

    <div class="av-controls">
      <div class="av-section-label">설정</div>
      <div class="av-slider-wrap">
        <label>노드 수 <span id="nodeVal">10</span></label>
        <input type="range" id="nodeSlider" min="5" max="18" value="10" />
      </div>
      <div class="goal-row hidden" id="goalRow">
        <span>목표 노드</span>
        <select id="goalSelect"></select>
      </div>
      <div class="av-slider-wrap">
        <label>재생 속도 <span id="speedVal">중간</span></label>
        <input type="range" id="speedSlider" min="1" max="5" value="3" />
      </div>
      <div class="av-btn-row">
        <button class="av-btn av-btn--primary" id="generateBtn">새 그래프</button>
        <button class="av-btn av-btn--secondary" id="resetBtn">↺ 처음</button>
      </div>
    </div>

    <div class="av-legend">
      <div class="av-section-label">범례</div>
      <div class="av-legend-item"><div class="av-legend-dot av-legend-dot--circle" style="background:#2a2845"></div>미방문</div>
      <div class="av-legend-item"><div class="av-legend-dot av-legend-dot--circle" style="background:#f7c96a"></div>우선순위 큐 대기</div>
      <div class="av-legend-item"><div class="av-legend-dot av-legend-dot--circle" style="background:#f76a8c"></div>현재 처리 중</div>
      <div class="av-legend-item"><div class="av-legend-dot av-legend-dot--circle" style="background:#6af7c8"></div>거리 확정</div>
      <div class="av-legend-item"><div class="av-legend-dot av-legend-dot--circle" style="background:#7c6af7"></div>최단 경로</div>
      <div class="av-legend-item"><div class="av-legend-dot" style="background:#f7c96a;border-radius:2px"></div>엣지 완화(relaxation)</div>
    </div>
  </aside>

  <main class="av-main">
    <div class="av-stats-bar">
      <div class="av-stat">
        <div class="av-stat__label">알고리즘</div>
        <div class="av-stat__value" id="algoName">Dijkstra</div>
      </div>
      <div class="av-stat">
        <div class="av-stat__label">처리 노드</div>
        <div class="av-stat__value av-stat__value--teal" id="visitedCount">0</div>
      </div>
      <div class="av-stat">
        <div class="av-stat__label">처리 순서</div>
        <div class="av-stat__value av-stat__value--purple" id="orderStr">—</div>
      </div>
      <div class="av-status av-status--idle" id="statusBadge">IDLE</div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="graphCanvas"></canvas>
    </div>

    <div class="av-step-bar">
      <div class="av-step-bar__counter"><span id="stepCur">0</span> / <span id="stepTot">0</span></div>
      <button class="av-step-btn" id="firstBtn" disabled>⏮</button>
      <button class="av-step-btn" id="prevBtn"  disabled>◀</button>
      <button class="av-step-btn av-step-btn--play" id="playBtn" disabled>▶</button>
      <button class="av-step-btn" id="nextBtn"  disabled>▶|</button>
      <button class="av-step-btn" id="lastBtn"  disabled>⏭</button>
      <div class="av-step-bar__desc" id="stepDesc">새 그래프를 생성하세요</div>
      <div class="av-step-bar__kbd">← → Space</div>
    </div>

    <div class="av-code-panel"><pre id="pseudoCode"></pre></div>
  </main>
</div>

<script type="module" src="src/graph/pathfinding.js"></script>
</body>
</html>
