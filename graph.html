<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그래프 탐색 — algo.viz</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --text: #e2e0ff;
      --muted: #5a5880;
      --accent: #f76a8c;
      --accent2: #7c6af7;
      --accent3: #6af7c8;
      --accent4: #f7c96a;
      /* node states */
      --node-unvisited: #2a2845;
      --node-inqueue:   #f7c96a;
      --node-visiting:  #f76a8c;
      --node-visited:   #6af7c8;
      --node-path:      #7c6af7;
      --edge-default:   #1e1e2e;
      --edge-traversed: #5a5880;
      --edge-active:    #f76a8c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.4;
    }

    nav {
      padding: 0.9rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 1.2rem;
    }

    nav a {
      font-family: 'Space Mono', monospace; font-size: 0.7rem;
      color: var(--muted); text-decoration: none; letter-spacing: 0.1em; transition: color 0.15s;
    }

    nav a:hover { color: var(--text); }

    nav a.home {
      font-size: 1rem; font-family: 'Syne', sans-serif; font-weight: 800;
      background: linear-gradient(135deg, #7c6af7, #f76a8c);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    nav .sep { color: var(--border); }
    nav .current { color: var(--text); font-size: 0.7rem; font-family: 'Space Mono', monospace; }

    .layout {
      display: grid;
      grid-template-columns: 270px 1fr;
      min-height: calc(100vh - 45px);
    }

    aside {
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1.6rem;
      overflow-y: auto;
    }

    .section-label {
      font-family: 'Space Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.6rem;
    }

    .algo-list { display: flex; flex-direction: column; gap: 0.35rem; }

    .algo-btn {
      background: none; border: 1px solid transparent;
      color: var(--muted); font-family: 'Syne', sans-serif;
      font-size: 0.9rem; font-weight: 700; text-align: left;
      padding: 0.55rem 1rem; border-radius: 8px;
      cursor: pointer; transition: all 0.18s; position: relative;
    }

    .algo-btn:hover { color: var(--text); background: var(--border); }

    .algo-btn.active {
      color: var(--accent);
      background: rgba(247,106,140,0.1);
      border-color: rgba(247,106,140,0.3);
    }

    .algo-btn.active::before {
      content: ''; position: absolute;
      left: -1.5rem; top: 50%; transform: translateY(-50%);
      width: 3px; height: 60%; background: var(--accent); border-radius: 2px;
    }

    /* INFO PANEL */
    .info-panel {
      background: rgba(247,106,140,0.04);
      border: 1px solid rgba(247,106,140,0.14);
      border-radius: 10px; padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: 0.8rem;
    }

    .algo-desc {
      font-size: 0.8rem; color: var(--text);
      line-height: 1.65; opacity: 0.85;
    }

    .complexity-table {
      width: 100%; border-collapse: collapse;
      font-family: 'Space Mono', monospace; font-size: 0.67rem;
    }

    .complexity-table th {
      color: var(--muted); font-weight: 400; text-align: left;
      padding: 0.28rem 0.4rem; border-bottom: 1px solid var(--border); letter-spacing: 0.05em;
    }

    .complexity-table td { padding: 0.28rem 0.4rem; color: var(--text); }
    .complexity-table tr:not(:last-child) td { border-bottom: 1px solid rgba(30,30,46,0.5); }
    .tc-val { color: var(--accent2) !important; }

    .meta-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .meta-badge {
      font-family: 'Space Mono', monospace; font-size: 0.62rem;
      padding: 0.25rem 0.6rem; border-radius: 5px;
    }

    .meta-blue { background: rgba(124,106,247,0.1); color: var(--accent2); border: 1px solid rgba(124,106,247,0.2); }
    .meta-teal { background: rgba(106,247,200,0.1); color: var(--accent3); border: 1px solid rgba(106,247,200,0.2); }

    /* Controls */
    .controls-group { display: flex; flex-direction: column; gap: 0.9rem; }

    .slider-wrap { display: flex; flex-direction: column; gap: 0.35rem; }

    .slider-wrap label {
      display: flex; justify-content: space-between;
      font-size: 0.82rem; color: var(--muted);
    }

    .slider-wrap label span {
      font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--text);
    }

    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 3px;
      background: var(--border); border-radius: 2px; outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      background: var(--accent); border-radius: 50%;
      cursor: pointer; transition: transform 0.15s;
    }

    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .btn-row { display: flex; gap: 0.5rem; }

    .btn {
      flex: 1; border: none; border-radius: 8px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.82rem; padding: 0.55rem 0; cursor: pointer; transition: all 0.18s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #e0506e; transform: translateY(-1px); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover:not(:disabled) { background: #252535; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

    /* Queue / Stack visualizer */
    .ds-panel {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 0.7rem 0.9rem;
      display: flex; flex-direction: column; gap: 0.45rem;
    }

    .ds-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted);
    }

    .ds-items {
      display: flex; flex-wrap: wrap; gap: 0.35rem; min-height: 28px;
    }

    .ds-item {
      font-family: 'Space Mono', monospace; font-size: 0.75rem;
      background: var(--border); color: var(--text);
      padding: 0.2rem 0.5rem; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .ds-item.head {
      background: rgba(247,106,140,0.2);
      color: var(--accent);
      border-color: rgba(247,106,140,0.3);
    }

    /* Legend */
    .legend { display: flex; flex-direction: column; gap: 0.45rem; }
    .legend-item { display: flex; align-items: center; gap: 0.55rem; font-size: 0.75rem; color: var(--muted); }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    /* ── MAIN ─────────────────────────────── */
    main {
      display: flex; flex-direction: column;
      padding: 1.4rem 1.8rem; gap: 1.1rem;
    }

    .stats-bar {
      display: flex; align-items: center; gap: 1.8rem; flex-wrap: wrap;
    }

    .stat-chip { display: flex; flex-direction: column; gap: 0.12rem; }

    .stat-chip .lbl {
      font-family: 'Space Mono', monospace; font-size: 0.56rem;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
    }

    .stat-chip .val { font-family: 'Space Mono', monospace; font-size: 1rem; color: var(--text); }
    .val.visited-c { color: var(--accent3); }
    .val.edge-c    { color: var(--accent2); }

    .status-badge {
      margin-left: auto; padding: 0.28rem 0.9rem;
      border-radius: 100px; font-family: 'Space Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.1em;
    }

    .status-badge.idle     { background: var(--border); color: var(--muted); }
    .status-badge.stepping { background: rgba(247,201,106,0.13); color: var(--accent4); }
    .status-badge.playing  { background: rgba(247,106,140,0.18); color: var(--accent); }
    .status-badge.done     { background: rgba(106,247,200,0.13); color: var(--accent3); }

    /* Canvas */
    .canvas-wrap {
      flex: 1; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; position: relative; min-height: 320px;
    }

    canvas {
      width: 100%; height: 100%;
      display: block;
    }

    /* Step bar */
    .step-bar {
      display: flex; align-items: center; gap: 0.65rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.7rem 1.1rem;
    }

    .step-ctr {
      font-family: 'Space Mono', monospace; font-size: 0.7rem;
      color: var(--muted); min-width: 95px; white-space: nowrap;
    }

    .step-ctr span { color: var(--text); }

    .step-btn {
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-family: 'Space Mono', monospace; font-size: 0.82rem;
      width: 32px; height: 32px; border-radius: 7px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.14s; flex-shrink: 0;
    }

    .step-btn:hover:not(:disabled) { background: var(--border); border-color: var(--accent); color: var(--accent); }
    .step-btn:disabled { opacity: 0.22; cursor: not-allowed; }

    .play-btn {
      background: var(--accent); border-color: var(--accent);
      color: #fff; width: 38px; font-size: 0.95rem;
    }

    .play-btn:hover:not(:disabled) { background: #e0506e !important; border-color: #e0506e !important; }

    .step-desc {
      flex: 1; font-size: 0.72rem; color: var(--muted);
      font-family: 'Space Mono', monospace;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }

    .kbd { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--muted); opacity: 0.5; white-space: nowrap; }

    /* Code panel */
    .code-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.9rem 1.3rem;
      max-height: 120px; overflow-y: auto;
    }

    .code-panel pre {
      font-family: 'Space Mono', monospace; font-size: 0.7rem;
      line-height: 1.85; color: var(--muted); white-space: pre-wrap;
    }

    .code-panel pre .hl {
      color: var(--accent); background: rgba(247,106,140,0.1);
      display: inline-block; width: 100%; border-radius: 3px; padding: 0 0.3rem;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @media (max-width: 750px) {
      .layout { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="home">algo.viz</a>
  <span class="sep">/</span>
  <span class="current">그래프 탐색</span>
</nav>

<div class="layout">
  <aside>
    <div>
      <div class="section-label">알고리즘</div>
      <div class="algo-list" id="algoList">
        <button class="algo-btn active" data-algo="bfs">BFS (너비 우선)</button>
        <button class="algo-btn" data-algo="dfs">DFS (깊이 우선)</button>
      </div>
    </div>

    <!-- Info panel -->
    <div class="info-panel" id="infoPanel">
      <div class="algo-desc" id="algoDesc"></div>
      <div class="meta-row" id="metaRow"></div>
    </div>

    <!-- DS visualizer (Queue / Stack) -->
    <div class="ds-panel">
      <div class="ds-label" id="dsLabel">Queue</div>
      <div class="ds-items" id="dsItems"></div>
    </div>

    <!-- Controls -->
    <div class="controls-group">
      <div class="section-label">설정</div>
      <div class="slider-wrap">
        <label>노드 수 <span id="nodeVal">10</span></label>
        <input type="range" id="nodeSlider" min="5" max="18" value="10" />
      </div>
      <div class="slider-wrap">
        <label>재생 속도 <span id="speedVal">중간</span></label>
        <input type="range" id="speedSlider" min="1" max="5" value="3" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary"   id="generateBtn">새 그래프</button>
        <button class="btn btn-secondary" id="resetBtn">↺ 처음</button>
      </div>
    </div>

    <!-- Legend -->
    <div class="legend">
      <div class="section-label">범례</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--node-unvisited)"></div>미방문</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--node-inqueue)"></div>Queue/Stack 대기</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--node-visiting)"></div>현재 처리 중</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--node-visited)"></div>방문 완료</div>
    </div>
  </aside>

  <main>
    <div class="stats-bar">
      <div class="stat-chip">
        <div class="lbl">알고리즘</div>
        <div class="val" id="algoName">BFS</div>
      </div>
      <div class="stat-chip">
        <div class="lbl">방문 노드</div>
        <div class="val visited-c" id="visitedCount">0</div>
      </div>
      <div class="stat-chip">
        <div class="lbl">탐색 순서</div>
        <div class="val edge-c" id="orderStr">—</div>
      </div>
      <div class="status-badge idle" id="statusBadge">IDLE</div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="graphCanvas"></canvas>
    </div>

    <div class="step-bar">
      <div class="step-ctr"><span id="stepCur">0</span> / <span id="stepTot">0</span></div>
      <button class="step-btn" id="firstBtn" disabled>⏮</button>
      <button class="step-btn" id="prevBtn"  disabled>◀</button>
      <button class="step-btn play-btn" id="playBtn" disabled>▶</button>
      <button class="step-btn" id="nextBtn"  disabled>▶|</button>
      <button class="step-btn" id="lastBtn"  disabled>⏭</button>
      <div class="step-desc" id="stepDesc">새 그래프를 생성하세요</div>
      <div class="kbd">← → Space</div>
    </div>

    <div class="code-panel">
      <pre id="pseudoCode"></pre>
    </div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════
//  METADATA
// ═══════════════════════════════════════════════
const ALGO_META = {
  bfs: {
    name: 'BFS (너비 우선 탐색)',
    desc: '시작 노드에서 가까운 노드부터 차례로 방문합니다. Queue(큐)를 사용하며, 최단 거리(hop count)를 보장합니다. 레벨 단위로 그래프를 탐색하는 데 적합합니다.',
    time: 'O(V + E)', space: 'O(V)',
    tags: ['Queue 사용', '최단 경로 보장'],
    dsName: 'Queue (FIFO)',
  },
  dfs: {
    name: 'DFS (깊이 우선 탐색)',
    desc: '한 방향으로 끝까지 파고든 뒤 되돌아오며 탐색합니다. Stack(스택) 또는 재귀로 구현하며, 경로 탐색·사이클 감지·위상 정렬 등에 활용됩니다.',
    time: 'O(V + E)', space: 'O(V)',
    tags: ['Stack 사용', '경로/사이클 탐색'],
    dsName: 'Stack (LIFO)',
  },
};

const PSEUDO = {
  bfs: [
    'BFS(graph, start):',
    '  visited = {start}',
    '  queue.enqueue(start)',
    '  while queue is not empty:',
    '    node = queue.dequeue()',
    '    process(node)',
    '    for each neighbor of node:',
    '      if neighbor not in visited:',
    '        visited.add(neighbor)',
    '        queue.enqueue(neighbor)',
  ],
  dfs: [
    'DFS(graph, start):',
    '  visited = {}',
    '  stack.push(start)',
    '  while stack is not empty:',
    '    node = stack.pop()',
    '    if node not in visited:',
    '      visited.add(node)',
    '      process(node)',
    '      for each neighbor of node:',
    '        if neighbor not in visited:',
    '          stack.push(neighbor)',
  ],
};

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let nodes       = [];   // {id, x, y, label}
let edges       = [];   // {u, v}  (undirected)
let adjList     = {};
let snapshots   = [];
let stepIdx     = 0;
let playTimer   = null;
let isPlaying   = false;
let currentAlgo = 'bfs';
const speedDelays = [900, 380, 140, 45, 8];
let playDelay = 140;

// Node colors
const NC = {
  unvisited: '#2a2845',
  inqueue:   '#f7c96a',
  visiting:  '#f76a8c',
  visited:   '#6af7c8',
};

const EC = {
  default:   '#2a2845',
  traversed: '#5a5880',
  active:    '#f76a8c',
};

// ═══════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════
const canvasWrap = document.getElementById('canvasWrap');
const canvas     = document.getElementById('graphCanvas');
const ctx        = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = canvasWrap.clientWidth;
  canvas.height = canvasWrap.clientHeight;
  if (snapshots.length) drawSnapshot(snapshots[stepIdx]);
}

window.addEventListener('resize', resizeCanvas);

// ═══════════════════════════════════════════════
//  GRAPH GENERATION
// ═══════════════════════════════════════════════
function generateGraph(n) {
  const W = canvasWrap.clientWidth  || 600;
  const H = canvasWrap.clientHeight || 320;
  const pad = 55, r = Math.min(W, H) / 2 - pad;
  const cx = W / 2, cy = H / 2;

  nodes = [];
  for (let i = 0; i < n; i++) {
    // Place nodes in a rough circle with jitter
    const angle = (2 * Math.PI * i / n) - Math.PI / 2;
    const jitter = (Math.random() - 0.5) * r * 0.35;
    nodes.push({
      id: i,
      x: cx + (r + jitter) * Math.cos(angle),
      y: cy + (r + jitter) * Math.sin(angle),
      label: String(i),
    });
  }

  // Build edges: ensure connected, then add extras
  edges = [];
  const visited = new Set([0]);
  const pool = nodes.map((_,i)=>i).filter(i=>i>0);
  // Spanning tree
  while (pool.length) {
    const u = [...visited][Math.floor(Math.random() * visited.size)];
    const idx = Math.floor(Math.random() * pool.length);
    const v = pool.splice(idx, 1)[0];
    edges.push({u, v});
    visited.add(v);
  }
  // Extra edges (density ~1.3x)
  const extra = Math.floor(n * 0.6);
  for (let k = 0; k < extra; k++) {
    const u = Math.floor(Math.random() * n);
    const v = Math.floor(Math.random() * n);
    if (u !== v && !edges.some(e => (e.u===u&&e.v===v)||(e.u===v&&e.v===u))) {
      edges.push({u, v});
    }
  }

  // Build adjacency list
  adjList = {};
  nodes.forEach(n => adjList[n.id] = []);
  edges.forEach(({u, v}) => { adjList[u].push(v); adjList[v].push(u); });
  // Sort adjacency lists for determinism
  Object.keys(adjList).forEach(k => adjList[k].sort((a,b)=>a-b));
}

// ═══════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════
function drawSnapshot(s) {
  if (!s) return;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const nodeR = Math.max(16, Math.min(22, 220 / nodes.length));

  // Draw edges
  edges.forEach(({u, v}, i) => {
    const nu = nodes[u], nv = nodes[v];
    const ec = s.edgeColors[i] || EC.default;
    ctx.beginPath();
    ctx.moveTo(nu.x, nu.y);
    ctx.lineTo(nv.x, nv.y);
    ctx.strokeStyle = ec;
    ctx.lineWidth = ec === EC.active ? 2.5 : 1.5;
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach(node => {
    const nc = s.nodeColors[node.id] || NC.unvisited;
    const isVisiting = nc === NC.visiting;

    // Glow for visiting node
    if (isVisiting) {
      ctx.beginPath();
      ctx.arc(node.x, node.y, nodeR + 7, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(247,106,140,0.18)';
      ctx.fill();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(node.x, node.y, nodeR, 0, Math.PI * 2);
    ctx.fillStyle = nc;
    ctx.fill();
    ctx.strokeStyle = isVisiting ? '#f76a8c' : 'rgba(255,255,255,0.08)';
    ctx.lineWidth = isVisiting ? 2 : 1;
    ctx.stroke();

    // Label
    ctx.fillStyle = '#0a0a0f';
    ctx.font = `bold ${Math.max(10, nodeR * 0.7)}px 'Space Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(node.label, node.x, node.y);

    // Visit order badge
    if (s.visitOrder[node.id] !== undefined) {
      const ox = node.x + nodeR * 0.75;
      const oy = node.y - nodeR * 0.75;
      ctx.beginPath();
      ctx.arc(ox, oy, 9, 0, Math.PI * 2);
      ctx.fillStyle = '#7c6af7';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = `bold 9px 'Space Mono', monospace`;
      ctx.fillText(s.visitOrder[node.id], ox, oy);
    }
  });
}

// ═══════════════════════════════════════════════
//  SNAPSHOT RECORDERS
// ═══════════════════════════════════════════════
function makeSnap(nodeColors, edgeColors, dsItems, visitedCount, visitOrder, orderStr, hlLine, desc) {
  return {
    nodeColors: {...nodeColors},
    edgeColors: [...edgeColors],
    dsItems: [...dsItems],
    visitedCount,
    visitOrder: {...visitOrder},
    orderStr,
    hlLine: hlLine ?? -1,
    desc: desc || '',
  };
}

function getEdgeIdx(u, v) {
  return edges.findIndex(e => (e.u===u&&e.v===v)||(e.u===v&&e.v===u));
}

function recordBFS(startNode) {
  const S = [];
  const nodeColors = {};
  const edgeColors = edges.map(() => EC.default);
  const visitOrder = {};
  nodes.forEach(n => nodeColors[n.id] = NC.unvisited);

  let visitCount = 0;
  let orderStr   = '';

  function s(hl, desc, dsItems) {
    S.push(makeSnap(nodeColors, edgeColors, dsItems, visitCount, visitOrder, orderStr, hl, desc));
  }

  const queue = [startNode];
  const visited = new Set([startNode]);
  nodeColors[startNode] = NC.inqueue;
  s(1, `시작 노드 ${startNode} Queue에 추가`, [...queue]);

  while (queue.length) {
    const node = queue.shift();
    nodeColors[node] = NC.visiting;
    s(4, `Queue에서 노드 ${node} 꺼냄`, [...queue]);

    nodeColors[node] = NC.visited;
    visitCount++;
    visitOrder[node] = visitCount;
    orderStr = Object.keys(visitOrder).sort((a,b)=>visitOrder[a]-visitOrder[b]).join(' → ');
    s(5, `노드 ${node} 처리 완료 (방문 순서: ${visitCount})`, [...queue]);

    for (const nb of adjList[node]) {
      const ei = getEdgeIdx(node, nb);
      edgeColors[ei] = EC.traversed;

      if (!visited.has(nb)) {
        visited.add(nb);
        nodeColors[nb] = NC.inqueue;
        queue.push(nb);
        edgeColors[ei] = EC.active;
        s(8, `이웃 ${nb} → Queue 추가`, [...queue]);
        edgeColors[ei] = EC.traversed;
      } else {
        s(7, `이웃 ${nb} 이미 방문됨, 건너뜀`, [...queue]);
      }
    }
  }

  s(-1, `BFS 완료 — ${visitCount}개 노드 방문`, []);
  return S;
}

function recordDFS(startNode) {
  const S = [];
  const nodeColors = {};
  const edgeColors = edges.map(() => EC.default);
  const visitOrder = {};
  nodes.forEach(n => nodeColors[n.id] = NC.unvisited);

  let visitCount = 0;
  let orderStr   = '';

  function s(hl, desc, dsItems) {
    S.push(makeSnap(nodeColors, edgeColors, dsItems, visitCount, visitOrder, orderStr, hl, desc));
  }

  const stack = [startNode];
  nodeColors[startNode] = NC.inqueue;
  s(2, `시작 노드 ${startNode} Stack에 push`, [...stack].reverse());

  const visited = new Set();

  while (stack.length) {
    const node = stack.pop();
    nodeColors[node] = NC.visiting;
    s(4, `Stack에서 노드 ${node} pop`, [...stack].reverse());

    if (visited.has(node)) {
      nodeColors[node] = NC.visited;
      s(5, `노드 ${node} 이미 방문됨, 건너뜀`, [...stack].reverse());
      continue;
    }

    visited.add(node);
    nodeColors[node] = NC.visited;
    visitCount++;
    visitOrder[node] = visitCount;
    orderStr = Object.keys(visitOrder).sort((a,b)=>visitOrder[a]-visitOrder[b]).join(' → ');
    s(6, `노드 ${node} 방문 (순서: ${visitCount})`, [...stack].reverse());

    // Push neighbors in reverse so smallest is processed first
    const neighbors = [...adjList[node]].reverse();
    for (const nb of neighbors) {
      const ei = getEdgeIdx(node, nb);
      if (!visited.has(nb)) {
        nodeColors[nb] = NC.inqueue;
        stack.push(nb);
        edgeColors[ei] = EC.active;
        s(9, `이웃 ${nb} → Stack push`, [...stack].reverse());
        edgeColors[ei] = EC.traversed;
      }
    }
  }

  s(-1, `DFS 완료 — ${visitCount}개 노드 방문`, []);
  return S;
}

// ═══════════════════════════════════════════════
//  UI UPDATES
// ═══════════════════════════════════════════════
function updateInfoPanel(algo) {
  const m = ALGO_META[algo];
  document.getElementById('algoDesc').textContent = m.desc;
  const metaRow = document.getElementById('metaRow');
  metaRow.innerHTML = [
    `<span class="meta-badge meta-blue">시간 ${m.time}</span>`,
    `<span class="meta-badge meta-teal">메모리 ${m.space}</span>`,
    ...m.tags.map(t => `<span class="meta-badge meta-blue">${t}</span>`),
  ].join('');
  document.getElementById('dsLabel').textContent = m.dsName;
}

function updatePseudo(hlLine) {
  const lines = PSEUDO[currentAlgo];
  document.getElementById('pseudoCode').innerHTML =
    lines.map((l,i) => i===hlLine ? `<span class="hl">${l}</span>` : l).join('\n');
}

function updateStepBtns() {
  const atStart = stepIdx===0, atEnd = stepIdx===snapshots.length-1;
  document.getElementById('firstBtn').disabled = atStart;
  document.getElementById('prevBtn').disabled  = atStart;
  document.getElementById('nextBtn').disabled  = atEnd;
  document.getElementById('lastBtn').disabled  = atEnd;
  document.getElementById('playBtn').disabled  = !snapshots.length;
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
}

function setStatus(s) {
  const sb = document.getElementById('statusBadge');
  sb.className = 'status-badge '+s;
  const L = {idle:'IDLE',stepping:'STEP',playing:'PLAY',done:'DONE ✓'};
  sb.textContent = L[s]||s;
}

function applySnapshot(idx) {
  if (!snapshots.length) return;
  const s = snapshots[idx];

  drawSnapshot(s);

  document.getElementById('visitedCount').textContent = s.visitedCount;
  document.getElementById('orderStr').textContent     = s.orderStr || '—';
  document.getElementById('stepCur').textContent      = idx + 1;
  document.getElementById('stepDesc').textContent     = s.desc;
  updatePseudo(s.hlLine);
  updateStepBtns();

  // DS items
  const dsEl = document.getElementById('dsItems');
  dsEl.innerHTML = s.dsItems.map((id, i) =>
    `<div class="ds-item ${i===0?'head':''}">${id}</div>`
  ).join('');
}

// ═══════════════════════════════════════════════
//  PLAYBACK
// ═══════════════════════════════════════════════
function goTo(idx) {
  stepIdx = Math.max(0, Math.min(snapshots.length-1, idx));
  applySnapshot(stepIdx);
  if (!isPlaying) setStatus(stepIdx===snapshots.length-1 ? 'done' : 'stepping');
}

function stopPlay() {
  isPlaying=false; clearInterval(playTimer); playTimer=null; updateStepBtns();
}

function startPlay() {
  if (stepIdx>=snapshots.length-1) goTo(0);
  isPlaying=true; setStatus('playing'); updateStepBtns();
  playTimer=setInterval(()=>{
    if (stepIdx>=snapshots.length-1) { stopPlay(); setStatus('done'); return; }
    goTo(stepIdx+1);
  }, playDelay);
}

function togglePlay() {
  if (!snapshots.length) return;
  isPlaying ? (stopPlay(), setStatus(stepIdx===snapshots.length-1?'done':'stepping')) : startPlay();
}

// ═══════════════════════════════════════════════
//  BUILD
// ═══════════════════════════════════════════════
function buildSnapshots() {
  stopPlay();
  const startNode = 0;
  snapshots = currentAlgo === 'bfs' ? recordBFS(startNode) : recordDFS(startNode);
  stepIdx = 0;
  document.getElementById('stepTot').textContent = snapshots.length;
  applySnapshot(0);
  setStatus('stepping');
}

function generateAll() {
  stopPlay();
  const n = parseInt(document.getElementById('nodeSlider').value);
  resizeCanvas();
  generateGraph(n);
  buildSnapshots();
}

// ═══════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════
document.getElementById('generateBtn').addEventListener('click', generateAll);
document.getElementById('resetBtn').addEventListener('click', ()=>{stopPlay();goTo(0);setStatus('stepping');});

document.getElementById('firstBtn').addEventListener('click',()=>{stopPlay();goTo(0);setStatus('stepping');});
document.getElementById('prevBtn').addEventListener('click', ()=>{stopPlay();goTo(stepIdx-1);setStatus('stepping');});
document.getElementById('nextBtn').addEventListener('click', ()=>{stopPlay();goTo(stepIdx+1);setStatus(stepIdx===snapshots.length-1?'done':'stepping');});
document.getElementById('lastBtn').addEventListener('click', ()=>{stopPlay();goTo(snapshots.length-1);setStatus('done');});
document.getElementById('playBtn').addEventListener('click', togglePlay);

const nodeSlider=document.getElementById('nodeSlider');
const nodeVal=document.getElementById('nodeVal');
nodeSlider.addEventListener('input',()=>nodeVal.textContent=nodeSlider.value);
nodeSlider.addEventListener('change',generateAll);

const speedSlider=document.getElementById('speedSlider');
const speedVal=document.getElementById('speedVal');
const speedLabels=['매우 느림','느림','중간','빠름','매우 빠름'];
speedSlider.addEventListener('input',()=>{
  const v=parseInt(speedSlider.value)-1;
  speedVal.textContent=speedLabels[v];
  playDelay=speedDelays[v];
  if(isPlaying){stopPlay();startPlay();}
});

document.getElementById('algoList').addEventListener('click',e=>{
  const btn=e.target.closest('.algo-btn'); if(!btn)return;
  document.querySelectorAll('.algo-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentAlgo=btn.dataset.algo;
  document.getElementById('algoName').textContent=ALGO_META[currentAlgo].name;
  updateInfoPanel(currentAlgo);
  if(nodes.length) buildSnapshots();
});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'){stopPlay();goTo(stepIdx+1);setStatus('stepping');}
  if(e.key==='ArrowLeft') {stopPlay();goTo(stepIdx-1);setStatus('stepping');}
  if(e.key===' ')         {e.preventDefault();togglePlay();}
  if(e.key==='Home')      {stopPlay();goTo(0);setStatus('stepping');}
  if(e.key==='End')       {stopPlay();goTo(snapshots.length-1);setStatus('done');}
});

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
updateInfoPanel('bfs');
updatePseudo(-1);
setTimeout(()=>{
  resizeCanvas();
  generateAll();
}, 50);
</script>
</body>
</html>
